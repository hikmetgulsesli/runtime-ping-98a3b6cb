<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Record - Runtime Ping</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>

                        "secondary": "#505f76",

                        "on-primary-fixed-variant": "#3f465c",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#45464d",
                        "tertiary-fixed": "#fcdeb5",
                        "on-primary": "#ffffff",
                        "background": "#fcf8fa",
                        "error-container": "#ffdad6",
                        "surface": "#fcf8fa",
                        "inverse-surface": "#303032",
                        "on-secondary-container": "#54647a",
                        "primary-container": "#131b2e",
                        "on-secondary": "#ffffff",
                        "on-background": "#1b1b1d",
                        "secondary-fixed": "#d3e4fe",
                        "tertiary": "#000000",
                        "on-tertiary-container": "#98805d",
                        "primary-fixed": "#dae2fd",
                        "surface-container": "#f0edef",
                        "surface-tint": "#565e74",
                        "on-primary-fixed": "#131b2e",
                        "on-secondary-fixed": "#0b1c30",
                        "tertiary-container": "#271901",
                        "primary": "#000000",
                        "on-surface": "#1b1b1d",
                        "on-tertiary-fixed-variant": "#574425",
                        "outline": "#76777d",
                        "on-primary-container": "#7c839b",
                        "surface-container-highest": "#e4e2e4",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#271901",
                        "inverse-primary": "#bec6e0",
                        "surface-container-high": "#eae7e9",
                        "on-secondary-fixed-variant": "#38485d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "0.25rem",
                        "margin-desktop": "1.5rem",
                        "base": "4px",
                        "xl": "2rem",
                        "margin-mobile": "1rem",
                        "md": "1rem",
                        "lg": "1.5rem",
                        "gutter": "1rem",
                        "sm": "0.5rem"
                    },
                    "fontFamily": {
                        "headline-lg": ["Geist"],
                        "label-mono": ["JetBrains Mono"],
                        "headline-md": ["Geist"],

                        "label-caps": ["Inter"]
                    },
                    "fontSize": {

                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Base styles mapped from tokens */
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
    </style>
</head>
<body class="min-h-screen font-body-md text-body-md antialiased bg-background">
<!-- TopNavBar: Suppressed for focused transactional task -->
<!-- SideNavBar: Suppressed for focused transactional task -->
<main class="max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop py-xl">
<!-- Header Section -->
<header class="mb-lg flex items-center justify-between">
<div>
<a class="inline-flex items-center text-secondary hover:text-primary transition-colors mb-sm" href="#">
<span class="material-symbols-outlined text-[18px] mr-xs">arrow_back</span>
<span class="font-label-caps text-label-caps uppercase">Back to Operations</span>
</a>
<div class="flex items-center gap-md">
<h1 class="font-headline-lg text-headline-lg text-primary">Edit Record: API Gateway</h1>
<!-- Modified Unsaved Badge -->
<span class="inline-flex items-center px-2 py-0.5 rounded-sm bg-surface-container-highest text-on-surface-variant font-label-caps text-label-caps uppercase border border-outline-variant">
                        Modified
                    </span>
</div>
</div>
<div class="flex gap-sm">
<!-- Secondary Action -->
<button class="h-8 px-md rounded-DEFAULT bg-surface-container-lowest border border-outline-variant text-on-surface hover:bg-surface-container-low transition-colors font-body-sm text-body-sm flex items-center justify-center" type="button">
                    Cancel
                </button>
<!-- Primary Action -->
<button class="h-8 px-md rounded-DEFAULT bg-primary text-on-primary hover:bg-surface-tint transition-colors font-body-sm text-body-sm flex items-center justify-center" type="button">
                    Save Changes
                </button>
</div>
</header>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-DEFAULT border border-outline-variant p-lg shadow-sm">
<form action="#" class="space-y-lg" method="POST">
<!-- Bento-style grid for inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Record Name -->
<div class="col-span-1 md:col-span-2">
<label class="block font-label-caps text-label-caps uppercase text-on-surface-variant mb-xs" for="record_name">
                            Record Name <span class="text-error">*</span>
</label>
<input class="w-full h-8 px-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-sm text-body-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="record_name" name="record_name" required="" type="text" value="API Gateway"/>
</div>
<!-- Endpoint URL -->
<div class="col-span-1 md:col-span-2">
<label class="block font-label-caps text-label-caps uppercase text-on-surface-variant mb-xs" for="endpoint_url">
                            Endpoint URL <span class="text-error">*</span>
</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm text-secondary">
<span class="material-symbols-outlined text-[16px]">link</span>
</span>
<input class="w-full h-8 pl-8 pr-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-label-mono text-label-mono text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="endpoint_url" name="endpoint_url" required="" type="url" value="https://api.internal.service/health"/>
</div>
<!-- Validation Message (Hidden by default, shown for demo) -->
<p class="mt-xs font-body-sm text-body-sm text-error flex items-center hidden" id="url-error">
<span class="material-symbols-outlined text-[14px] mr-xs">error</span>
                            Please enter a valid HTTPS URL.
                        </p>
</div>
<!-- Ping Interval -->
<div class="col-span-1">
<label class="block font-label-caps text-label-caps uppercase text-on-surface-variant mb-xs" for="ping_interval">
                            Ping Interval <span class="text-error">*</span>
</label>
<select class="w-full h-8 px-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-sm text-body-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all appearance-none" id="ping_interval" name="ping_interval" required="">
<option value="10s">Every 10 seconds</option>
<option value="30s">Every 30 seconds</option>
<option selected="" value="1m">Every 1 minute</option>
<option value="5m">Every 5 minutes</option>
</select>
</div>
<!-- Tags -->
<div class="col-span-1">
<label class="block font-label-caps text-label-caps uppercase text-on-surface-variant mb-xs" for="tags">
                            Tags
                        </label>
<div class="flex items-center gap-xs flex-wrap mb-xs">
<span class="inline-flex items-center px-2 py-0.5 rounded-sm bg-surface-container-high text-on-surface-variant font-label-mono text-label-mono border border-outline-variant">
                                production
                                <button class="ml-1 text-secondary hover:text-error focus:outline-none" type="button">
<span class="material-symbols-outlined text-[12px]">close</span>
</button>
</span>
<span class="inline-flex items-center px-2 py-0.5 rounded-sm bg-surface-container-high text-on-surface-variant font-label-mono text-label-mono border border-outline-variant">
                                api
                                <button class="ml-1 text-secondary hover:text-error focus:outline-none" type="button">
<span class="material-symbols-outlined text-[12px]">close</span>
</button>
</span>
</div>
<div class="relative">
<input class="w-full h-8 px-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-sm text-body-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="tags" name="tags" placeholder="Add tag..." type="text"/>
</div>
</div>
<!-- Description -->
<div class="col-span-1 md:col-span-2">
<label class="block font-label-caps text-label-caps uppercase text-on-surface-variant mb-xs" for="description">
                            Description
                        </label>
<textarea class="w-full p-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-sm text-body-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none" id="description" name="description" rows="3">Primary gateway for external traffic. Monitored for latency spikes.</textarea>
</div>
</div>
<!-- Footer Actions (Sticky on mobile if needed, inline here) -->
<div class="pt-lg mt-lg border-t border-outline-variant flex justify-end gap-sm">
<button class="h-8 px-md rounded-DEFAULT bg-surface-container-lowest border border-outline-variant text-on-surface hover:bg-surface-container-low transition-colors font-body-sm text-body-sm" type="button">
                        Cancel
                    </button>
<button class="h-8 px-md rounded-DEFAULT bg-primary text-on-primary hover:bg-surface-tint transition-colors font-body-sm text-body-sm flex items-center" type="submit">
<span class="material-symbols-outlined text-[16px] mr-xs">save</span>
                        Save Changes
                    </button>
</div>
</form>
</div>
</main>
<script>
        // Simple client-side validation logic example
        const endpointInput = document.getElementById('endpoint_url');
        const errorMsg = document.getElementById('url-error');

        endpointInput.addEventListener('input', function() {
            if (this.value && !this.value.startsWith('https://')) {
                errorMsg.classList.remove('hidden');
                this.classList.add('border-error', 'focus:ring-error');
                this.classList.remove('focus:ring-primary');
            } else {
                errorMsg.classList.add('hidden');
                this.classList.remove('border-error', 'focus:ring-error');
                this.classList.add('focus:ring-primary');
            }
        });
    </script>
</body></html>
